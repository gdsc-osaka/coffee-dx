name = "coffee-dx"
compatibility_date = "2026-04-04"
main = "./worker.ts"
assets = { directory = "./build/client" }

# react-router build の出力へ差し替え（wrangler deploy / wrangler dev のバンドル用）
[alias]
"virtual:react-router/server-build" = "./build/server/index.js"

[[d1_databases]]
binding = "DB"
database_name = "coffee-dx-db"
database_id = "548f7cf3-07db-4da6-b3a7-8f769d3a685d"
migrations_dir = "drizzle/migrations"

